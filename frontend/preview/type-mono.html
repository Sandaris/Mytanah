<!doctype html>
<!-- @dsCard group="Type" name="Type — Data (JetBrains Mono)" subtitle="Prices, scores, deltas" viewport="700x220" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:18px 24px;display:grid;gap:10px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--cream-border);padding-bottom:10px;}
  .row:last-child{border:0;}
  .tag{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);width:80px;flex-shrink:0;}
  .sample{flex:1;font-family:var(--font-mono);color:var(--forest-deep);font-feature-settings:'tnum';}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="tag">XL 36</div><div class="sample" style="font-size:36px;font-weight:500;">RM 450,000</div></div>
  <div class="row"><div class="tag">LG 24</div><div class="sample" style="font-size:24px;">61.4 / 100</div></div>
  <div class="row"><div class="tag">MD 18</div><div class="sample" style="font-size:18px;">+2.4%   Q1 2025</div></div>
  <div class="row"><div class="tag">SM 13</div><div class="sample" style="font-size:13px;color:var(--forest-mid);">2020 Q1 – 2025 Q1</div></div>
</div>
</body></html>
