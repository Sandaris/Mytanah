<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MyPropertyIQ</title>
<link rel="stylesheet" href="/app/colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; background: #0a0e0c; }
  #root { height: 100%; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Dashboard loads silently in the background while the intro plays.
     dashboard.html body background is cream (#DCD7C9) so even mid-load
     the iframe shows cream, not a white flash. -->
<iframe id="dash-frame" src="dashboard.html?from=intro"
  style="position:fixed;inset:0;width:100%;height:100%;border:none;visibility:hidden;z-index:-1;"
  title="Dashboard">
</iframe>

<script type="text/babel" src="MalaysiaGeo.jsx"></script>
<script type="text/babel" src="Intro.jsx"></script>

<script type="text/babel">
const { useEffect, useRef } = React;

const App = () => {
  const iframeReadyRef = useRef(false);
  const doneRef = useRef(false);
  const revealRef = useRef(null);

  useEffect(() => {
    const frame = document.getElementById('dash-frame');
    revealRef.current = () => {
      frame.style.transition = 'opacity 0.6s ease';
      frame.style.opacity = '0';
      frame.style.visibility = 'visible';
      frame.style.zIndex = '200';
      requestAnimationFrame(() => requestAnimationFrame(() => { frame.style.opacity = '1'; }));
      history.replaceState(null, '', 'dashboard.html?from=intro');
    };
    frame.addEventListener('load', () => {
      iframeReadyRef.current = true;
      if (doneRef.current) revealRef.current();
    });
  }, []);

  const handleDone = () => {
    doneRef.current = true;
    if (iframeReadyRef.current) {
      revealRef.current();
    } else {
      window.location.href = 'dashboard.html?from=intro';
    }
  };

  return <Intro onDone={handleDone}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
