<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Forest & Earth" subtitle="Authority green + accent brown" viewport="700x260" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .card{padding:20px 24px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .sw{border-radius:10px;border:1px solid var(--cream-border);overflow:hidden;}
  .chip{height:64px;}
  .meta{padding:8px 10px;background:var(--cream-raised);font-family:var(--font-ui);font-size:11px;display:flex;justify-content:space-between;color:var(--forest-deep);}
  .meta b{font-weight:500;}
  .meta .hex{font-family:var(--font-mono);color:var(--forest-mid);}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#2C3930"></div><div class="meta"><b style="color:#fff;">forest-deep</b><span class="hex">#2C3930</span></div></div>
    <div class="sw"><div class="chip" style="background:#3F4F44"></div><div class="meta"><b>forest-mid</b><span class="hex">#3F4F44</span></div></div>
    <div class="sw"><div class="chip" style="background:#5C7065"></div><div class="meta"><b>forest-light</b><span class="hex">#5C7065</span></div></div>
  </div>
  <div class="row" style="margin-top:10px;">
    <div class="sw"><div class="chip" style="background:#A27B5C"></div><div class="meta"><b>earth</b><span class="hex">#A27B5C</span></div></div>
    <div class="sw"><div class="chip" style="background:#C49A7A"></div><div class="meta"><b>earth-light</b><span class="hex">#C49A7A</span></div></div>
    <div class="sw"><div class="chip" style="background:#A27B5C20"></div><div class="meta"><b>earth-faint</b><span class="hex">20% alpha</span></div></div>
  </div>
</div>
</body></html>
