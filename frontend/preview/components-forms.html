<!doctype html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Select, pills, text fields" viewport="700x280" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:22px;display:grid;gap:14px;}
  label{font-family:var(--font-ui);font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);display:block;margin-bottom:6px;}
  input,select{background:var(--cream);border:1px solid #A27B5C40;color:var(--forest-deep);font-family:var(--font-ui);font-size:14px;border-radius:8px;padding:10px 12px;width:100%;box-sizing:border-box;}
  input:focus,select:focus{outline:none;border-color:var(--earth);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .pills{display:flex;gap:6px;}
  .pill{border:1px solid var(--cream-border);background:var(--cream);color:var(--forest-deep);font-family:var(--font-ui);font-size:13px;border-radius:9999px;padding:8px 14px;cursor:pointer;}
  .pill.active{background:var(--forest-deep);color:var(--cream);border-color:var(--forest-deep);}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div><label>State</label><select><option>Selangor</option></select></div>
    <div><label>District</label><select><option>Petaling</option></select></div>
  </div>
  <div>
    <label>Tenure</label>
    <div class="pills"><div class="pill active">Freehold</div><div class="pill">Leasehold</div></div>
  </div>
  <div><label>Built-Up Area</label><input value="1,450 sq ft"></div>
</div>
</body></html>
