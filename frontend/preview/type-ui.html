<!doctype html>
<!-- @dsCard group="Type" name="Type — UI (DM Sans)" subtitle="Body, eyebrows, italics" viewport="700x220" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:18px 24px;display:grid;gap:10px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--cream-border);padding-bottom:8px;}
  .row:last-child{border:0;}
  .tag{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);width:80px;flex-shrink:0;}
  .sample{flex:1;color:var(--forest-deep);}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="tag">H3 / UI 18</div><div class="sample" style="font-family:var(--font-ui);font-size:18px;font-weight:500;">Contributing Factors</div></div>
  <div class="row"><div class="tag">Body 15</div><div class="sample" style="font-family:var(--font-ui);font-size:15px;font-weight:400;">Central estimate sits in the upper quartile of Selangor district medians.</div></div>
  <div class="row"><div class="tag">Eyebrow</div><div class="sample" style="font-family:var(--font-ui);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);">Market Commentary</div></div>
  <div class="row"><div class="tag">Italic</div><div class="sample" style="font-family:var(--font-display);font-size:17px;font-style:italic;">Confidence comes from restraint.</div></div>
</div>
</body></html>
