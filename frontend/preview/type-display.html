<!doctype html>
<!-- @dsCard group="Type" name="Type — Display (Cormorant Garamond)" subtitle="Editorial headlines" viewport="700x190" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:18px 24px;display:grid;gap:10px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--cream-border);padding-bottom:8px;}
  .row:last-child{border:0;}
  .tag{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);width:64px;flex-shrink:0;}
  .sample{flex:1;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="tag">Display</div><div class="sample" style="font-family:var(--font-display);font-size:40px;font-weight:500;color:var(--forest-deep);line-height:1;">MyPropertyIQ</div></div>
  <div class="row"><div class="tag">H1 32px</div><div class="sample" style="font-family:var(--font-display);font-size:32px;font-weight:500;color:var(--forest-deep);line-height:1;">Where is your property?</div></div>
  <div class="row"><div class="tag">H2 24px</div><div class="sample" style="font-family:var(--font-display);font-size:24px;font-weight:400;color:var(--forest-deep);line-height:1;">Median Prices by District</div></div>
</div>
</body></html>
