<!doctype html>
<!-- @dsCard group="Brand" name="Iconography (Lucide)" subtitle="1.5px stroke, 24×24 grid" viewport="700x140" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:22px;display:grid;grid-template-columns:repeat(7,1fr);gap:14px;}
  .icon{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .icon svg{stroke:var(--forest-deep);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
  .lbl{font-family:var(--font-ui);font-size:10px;color:var(--forest-mid);text-transform:uppercase;letter-spacing:.1em;}
</style></head><body>
<div class="wrap">
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 12 L12 4 L21 12"/><path d="M5 10 V20 H19 V10"/></svg><div class="lbl">Home</div></div>
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg><div class="lbl">Trend</div></div>
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 3 L22 21 L2 21 Z"/><line x1="12" y1="10" x2="12" y2="15"/><circle cx="12" cy="18" r="0.6"/></svg><div class="lbl">Alert</div></div>
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><div class="lbl">Pin</div></div>
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg><div class="lbl">Chevron</div></div>
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg><div class="lbl">Arrow</div></div>
  <div class="icon"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg><div class="lbl">Loading</div></div>
</div>
</body></html>
