<!doctype html>
<!-- @dsCard group="Components" name="HCR hero banner" subtitle="Named risk state + composite score" viewport="700x140" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:20px;}
  .hero{background:var(--forest-deep);border-radius:14px;padding:24px 28px;border-bottom:4px solid #2D7A4F;color:var(--cream);display:flex;justify-content:space-between;align-items:center;}
  .label{font-family:var(--font-display);font-size:42px;font-weight:400;letter-spacing:-.01em;line-height:1;}
  .score-lbl{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);}
  .score{font-family:var(--font-mono);font-size:26px;color:var(--earth-light,#C49A7A);margin-top:6px;}
</style></head><body>
<div class="wrap">
  <div class="hero">
    <div class="label">Upward Pressure</div>
    <div style="text-align:right;"><div class="score-lbl">Composite Score</div><div class="score">+0.42</div></div>
  </div>
</div>
</body></html>
