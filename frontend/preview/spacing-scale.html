<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4-based, 10 stops" viewport="700x150" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:20px;display:flex;align-items:flex-end;gap:14px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--earth);width:32px;border-radius:4px;}
  .lbl{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--forest-mid);}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--forest-deep);}
</style></head><body>
<div class="wrap">
  <div class="item"><div class="bar" style="height:4px;"></div><div class="px">4</div><div class="lbl">1</div></div>
  <div class="item"><div class="bar" style="height:8px;"></div><div class="px">8</div><div class="lbl">2</div></div>
  <div class="item"><div class="bar" style="height:12px;"></div><div class="px">12</div><div class="lbl">3</div></div>
  <div class="item"><div class="bar" style="height:16px;"></div><div class="px">16</div><div class="lbl">4</div></div>
  <div class="item"><div class="bar" style="height:20px;"></div><div class="px">20</div><div class="lbl">5</div></div>
  <div class="item"><div class="bar" style="height:24px;"></div><div class="px">24</div><div class="lbl">6</div></div>
  <div class="item"><div class="bar" style="height:32px;"></div><div class="px">32</div><div class="lbl">7</div></div>
  <div class="item"><div class="bar" style="height:40px;"></div><div class="px">40</div><div class="lbl">8</div></div>
  <div class="item"><div class="bar" style="height:56px;"></div><div class="px">56</div><div class="lbl">9</div></div>
  <div class="item"><div class="bar" style="height:72px;"></div><div class="px">72</div><div class="lbl">10</div></div>
</div>
</body></html>
