<!doctype html>
<!-- @dsCard group="Brand" name="Logo & wordmark" subtitle="Cormorant + earth-brown house mark" viewport="700x140" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .wrap{padding:24px;display:flex;align-items:center;gap:32px;}
  .stamp{display:flex;align-items:center;gap:10px;}
  .stamp svg{flex-shrink:0;}
  .stamp .name{font-family:var(--font-display);font-size:28px;font-weight:500;color:var(--forest-deep);letter-spacing:.2px;}
  .stamp.dark{background:var(--forest-deep);padding:12px 18px;border-radius:10px;}
  .stamp.dark .name{color:var(--cream);}
</style></head><body>
<div class="wrap">
  <div class="stamp">
    <svg width="34" height="34" viewBox="0 0 32 32" fill="none" stroke="#A27B5C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16 L16 4 L29 16"/><path d="M6 14 L6 28 L26 28 L26 14"/><path d="M13 28 L13 19 L19 19 L19 28"/></svg>
    <div class="name">MyPropertyIQ</div>
  </div>
  <div class="stamp dark">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none" stroke="#A27B5C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16 L16 4 L29 16"/><path d="M6 14 L6 28 L26 28 L26 14"/><path d="M13 28 L13 19 L19 19 L19 28"/></svg>
    <div class="name">MyPropertyIQ</div>
  </div>
</div>
</body></html>
