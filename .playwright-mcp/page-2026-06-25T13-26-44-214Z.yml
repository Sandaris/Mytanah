                    - paragraph [ref=e2033]: Centrestage Designer Suite is a beautifully designed and a unique SOHO development located in Off Jalan Semangat, Seksyen 13, Petaling Jaya, Selangor. The construction of this project was done by a famous development company known as the and the development of this project was completed in the year 2014. It is considered to be a great addition to the -- property. The property is going to boom in the future, making it ideal from an investment perspective. The Centrestage Designer Suite is indeed a great place to live in. The development offers many great facilities and features that the residents of many new developments only dream of having. The residents of the development can enjoy a business center facility in the development which can be used on different business purposes. There is a landscaped garden facility in the development where the residents can enjoy some fresh environment. Centrestage Designer Suite provides other facilities and features as well, such as a swimming pool and a great gymnasium equipped with latest exercising machines where the residents can work out while remaining in the development and enjoy a healthy lifestyle. The development also provides complete parking facility for its residents. Most importantly, the development is equipped with modern security gadgets and provides 24 hour security to its residents to make sure that the residents are protected from any kind of external threats while they are in the development. Centrestage Designer Suite was developed strategically keeping in mind the importance of accessibility of the location. The residents do not have to worry about moving to and from the location even if they do not have their own vehicles. The development is easily accessible via major roads and highways of the area such as Federal Highway, Jalan University, Jalan Utara and Jalan Semangat. Public transportation is also available in the area and the residents can use taxis, LRT and buses to move to and from the location easily. Other than its strategic location, the area is surrounded with plenty of amenities. The residents do not have to worry about anything in the area because everything is easily available in the locality. Educational institutions such as University Malaya, University Tunku Abdul Rahman, Sultan Abdul Saman Secondary School and Sri Petaling National School are just a short distance away from the development. There are many shopping spots as well near the development and few of the famous shopping spots near the development are namely Jaya One Mall, Digital Mall and SS2 Mall from where the residents can shop for almost anything they want. Furthermore, there are many eateries, mosques, petrol stations, churches and hospitals as well in the area, making sure that the residents of the development do not have to worry about anything. The Centrestage Designer Suite has a great design and consists of 14 floors. There are a total of 352 serviced units, 775 office suites and 33 retail shops in the development and it is considered to be a high density but a peaceful development. The built up area of the units in the development ranges between 302 sq ft and 965 sq ft. The buyers have the option to select from different designs as well. The buyers also have the option to rent out the units, making the development attractive from investment point of view as well. The development company of the Centrestage Designer Suite made sure that there was no cost cutting done on the project. The development company went a step ahead to make sure that the residents do not have to face any kind of issue in the development. The starting selling price of the units in the development varies between RM 245,000 and RM 740,000 accordingly to the view and the design of the unit. The rent of the units in the development starts from RM 1100 and rises up till RM 4500 per month. The following developments are in the same neighbourhood as Centrestage Designer 