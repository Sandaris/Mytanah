<!doctype html>
<!-- @dsCard group="Spacing" name="Corner radii" subtitle="6 / 8 / 12 / 16 / pill" viewport="700x160" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .grid{padding:22px;display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:48px;background:var(--cream-raised);border:1px solid var(--cream-border);}
  .lbl{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--forest-deep);}
</style></head><body>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:6px;"></div><div class="lbl">sm</div><div class="px">6px</div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="lbl">md</div><div class="px">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px;"></div><div class="lbl">lg</div><div class="px">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px;"></div><div class="lbl">xl</div><div class="px">16px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px;"></div><div class="lbl">pill</div><div class="px">9999</div></div>
</div>
</body></html>
