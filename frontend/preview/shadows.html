<!doctype html>
<!-- @dsCard group="Spacing" name="Shadow elevation" subtitle="Warm, forest-tinted" viewport="700x160" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .grid{padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:100%;height:64px;background:var(--cream-raised);border:1px solid var(--cream-border);border-radius:10px;}
  .xs{box-shadow:0 1px 2px rgba(44,57,48,.06);}
  .sm{box-shadow:0 2px 6px rgba(44,57,48,.08);}
  .md{box-shadow:0 8px 20px rgba(44,57,48,.10);}
  .lg{box-shadow:0 32px 80px rgba(44,57,48,.18);}
  .lbl{font-family:var(--font-ui);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--earth);}
</style></head><body>
<div class="grid">
  <div class="item"><div class="box xs"></div><div class="lbl">xs · hover hint</div></div>
  <div class="item"><div class="box sm"></div><div class="lbl">sm · card resting</div></div>
  <div class="item"><div class="box md"></div><div class="lbl">md · card hover</div></div>
  <div class="item"><div class="box lg"></div><div class="lbl">lg · modal</div></div>
</div>
</body></html>
