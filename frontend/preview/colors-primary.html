<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Cream (primary surface)" subtitle="Page bg + raised surfaces" viewport="700x140" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream);}
  .card{padding:20px 24px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:10px;border:1px solid var(--cream-border);overflow:hidden;}
  .chip{height:64px;}
  .meta{padding:8px 10px;background:var(--cream-raised);font-family:var(--font-ui);font-size:11px;display:flex;justify-content:space-between;color:var(--forest-deep);}
  .meta b{font-weight:500;}
  .meta .hex{font-family:var(--font-mono);color:var(--forest-mid);}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#DCD7C9"></div><div class="meta"><b>cream</b><span class="hex">#DCD7C9</span></div></div>
    <div class="sw"><div class="chip" style="background:#EDE9E1"></div><div class="meta"><b>cream-raised</b><span class="hex">#EDE9E1</span></div></div>
    <div class="sw"><div class="chip" style="background:#C8C3B8"></div><div class="meta"><b>cream-border</b><span class="hex">#C8C3B8</span></div></div>
    <div class="sw"><div class="chip" style="background:#B0AA9E"></div><div class="meta"><b>cream-muted</b><span class="hex">#B0AA9E</span></div></div>
  </div>
</div>
</body></html>
